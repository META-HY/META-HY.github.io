  site:
    subtitle: 无限星火
    author: 无限星火
    nick: Infinite Spark
    description: LIFE AND DREAM
    link: '/'
    language: zh-CN
    multi_language: true
    logo: https://s3.bmp.ovh/imgs/2022/08/24/745a612bca277e56.png
    avatar: https://s3.bmp.ovh/imgs/2022/08/24/745a612bca277e56.png
    beian:
      number: ''
      link: ''
    police_beian:
      number: ''
      link: ''
    # Start date of the blog YYY-MM-DD
    # 博客开始运行日期
    started_date: 2022-01-01
    # Path unique identifier (文章 URL 唯一标识)
    # uid: use unique ID
    # slug: use generated slug base on title
    # (Default is 'slug')
    pathSlug: 'slug'
  
  #! ---------------------------------------------------------------
  #! Authors Configs
  #！ @docs https://aurora.tridiamond.tech/guide/authors.html
  #! ---------------------------------------------------------------
  authors:
    ##! example
    HuaYang:
      name: HuaYang
      avatar: https://s3.bmp.ovh/imgs/2022/07/05/f30c5a60868494ae.png
      link: https://github.com/META-HY
      description: 'LIFE AND DREAM'
      socials:
        github: https://github.com/META-HY
  
  #! ---------------------------------------------------------------
  #! Menu Configs
  #！ @docs https://aurora.tridiamond.tech/guide/menu.html
  #! ---------------------------------------------------------------
  menu:
    Tags: true
    Tools:
      name: 'Tools'
      i18n:
        zh-CN: '工具'
        en: 'Tools'
      children:
        #home:
        #  name: 'home'
        #  i18n:
        #    zh-CN: '主页'
        #    en: 'Home'
        #  path: 'https://infspark.com/'
        Random password:
          name: 'Random password'
          i18n:
            zh-CN: '随机密码生成器'
            en: 'Random password'
          path: 'https://rp.infspark.com/'
        Github api:
          name: 'Github api'
          i18n:
            zh-CN: 'Github下载加速'
            en: 'Github api'
          path: 'https://github.infspark.com/'
        Docker api:
          name: 'Docker api'
          i18n:
            zh-CN: 'docker镜像源'
            en: 'Docker api'
          path: 'https://docker.infspark.com/'
    #message-board:
