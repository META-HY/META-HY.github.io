  #! ---------------------------------------------------------------
  #! Site Meta Configs
  #! @docs https://aurora.tridiamond.tech/guide/theme.html
  #! ---------------------------------------------------------------
  site_meta:
    cdn: cn
    favicon: https://s3.bmp.ovh/imgs/2022/07/05/f30c5a60868494ae.png
    description: 'HuaYang,META-HY'
    keywords: 'HuaYang,华阳,META-HY'
    author: 'HuaYang'
  
  #! ---------------------------------------------------------------
  #! Plugins
  #! @docs https://aurora.tridiamond.tech/guide/plugins.html
  #! ---------------------------------------------------------------
  
  # For local development only!
  gitalk:
    enable: true
    autoExpand: true
    clientID: '5045d2385129ddd067dd'
    clientSecret: '60701f81bd9799b16d5e42dcaede2dcac5a3ddab'
    repo: 'Comment'
    owner: 'META-HY'
    admin: ['META-HY','HuaYang']
    id: uid
    language: zh-CN
    distractionFreeMode: true
    recentComment: true
    proxy: ''
  
  # Valine comment plugin (recommended!)
  # see https://valine.js.org/quickstart.html
  valine:
    enable: false
    app_id:
    app_key:
    avatar: ''
    placeholder: Leave your thoughts behind~
    visitor: true
    lang: en
    avatarForce: false
    meta: ['nick', 'mail']
    requiredFields: ['nick', 'mail']
    admin: '' # admin username
    recentComment: true
  
  # Twikoo comment plugin
  # see https://twikoo.js.org/quick-start.html
  twikoo:
    enable: true
    recentComment: true
    envId: twikoocomment.vercel.app
    # 腾讯云环境填 envId；Vercel 环境填地址（https://xxx.vercel.app）
    # region: ap-guangzhou # 环境地域，默认为 ap-shanghai，腾讯云环境填 ap-shanghai 或 ap-guangzhou；Vercel 环境不填
    lang: 'zh-CN' # 用于手动设定评论区语言，支持的语言列表 https://github.com/imaegoo/twikoo/blob/main/src/client/utils/i18n/index.js
  
  # Waline comment plugin
  # see https://waline.js.org/guide/get-started/
  waline:
    enable: false
    recentComment: true
    reaction: false
    login: 'disable'
    meta: ['nick', 'mail']
    requiredMeta: ['nick', 'mail']
    commentSorting: 'latest'
    wordLimit: 0
    imageUploader: false
    pageSize: 10
    serverURL: '' # 填写服务端地址
  
  # Enable Busuanzi statistic plugin
  # see http://ibruce.info/2015/04/04/busuanzi/
  busuanzi:
    enable: ture
  
  copy_protection:
    enable: true
    author:
      cn: 作者
      en: Author
    link:
      cn: 本文来自于
      en: Article is from
    license:
      cn: 博客内容遵循 署名-非商业性使用-相同方式共享 4.0 国际 (CC BY-NC-SA 4.0) 协议
      en: This content is shared under the CC BY-NC-SA 4.0 protocol (Non-Commercial)
  
  #! ---------------------------------------------------------------
  #! Enable Aurora Bot Dia
  #! @docs https://aurora.tridiamond.tech/guide/site-meta.html#custom-meta
  #! ---------------------------------------------------------------
  aurora_bot:
    enable: false
    locale: zh-CN
    bot_type: dia
    tips:
  
  #! ---------------------------------------------------------------
  #! Injections
  #! @docs https://aurora.tridiamond.tech/guide/site-meta.html#custom-meta
  #! ---------------------------------------------------------------
  injects:
    scripts:
    css:
  
  #! ---------------------------------------------------------------
  #! Footer links
  #! ---------------------------------------------------------------
  #footer_links:
  #  - title: # main title
  #    links:
  #      - title: # link title
  #        url: # URL link
  #      - title: # link title
  #        url: # URL link
  #      - title: Friends # link of friends mode / 友链模式
  #        mode: 'links'
  
  #! ---------------------------------------------------------------
  #! Highlighter Shiki
  #! ---------------------------------------------------------------
  shiki:
    enable: true
    backgroundColor: "#1a1a1a"

# 文章加密
  encrypt:
    enable: ture
