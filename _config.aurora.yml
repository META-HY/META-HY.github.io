      i18n:
        zh-CN: '联系我'
        en: 'Mail Me'
      path: 'mailto:date.overlay-07@icloud.com'
    Archives: false
    About: false
    Friends: false
  
  #! ---------------------------------------------------------------
  #! Theme Config
  #! @docs https://aurora.tridiamond.tech/guide/theme.html
  #! ---------------------------------------------------------------
  theme:
    dark_mode: auto
    profile_shape: circle # support `circle`, `diamond`, `rounded`
    feature: true
    gradient:
      color_1: '#3355ff'
      color_2: '#3355ff'
      color_3: '#3355ff'
  
  #! ---------------------------------------------------------------
  #! Social Configs
  #! @docs https://aurora.tridiamond.tech/guide/social.html
